<style>
/* ─── CSS Variables ─────────────────────────────────────────────── */
:root {
  --primary:     #d5d5d5;
  --surface:     #fef9eb; /* #161a20; */
  --surface2:    #f2eee0; /* #1e242d; */
  --surface3:    #e7e2d5; /* #252d38; */
  --bg:          #ffffff; /* #0d0f12; */
  --border:      #2a3340;
  --border-hi:   #3d4f63;
  --accent:      #2e6a44;
  --accent-hi:   #4EB172;
  --accent-dim:  #245235;
  --accent-text: #ffffff;
  --tree-badge:  68 145 64;
  --sign-badge:  33 140 194;
  --danger:      #ef4444;
  --danger-hi:   #f87171;
  --success:     #22c55e;
  --warn:        #f59e0b;
  --text:        #000000;
  --text-muted:  #242424;
  --text-dim:    #3B3B3B;
  --mono:        'IBM Plex Mono', monospace;
  --sans:        'IBM Plex Sans', sans-serif;
  --radius:      6px;
  --radius-lg:   10px;
  --shadow:      0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.7);
}

/* ─── Reset & Base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── Scrollbar ─────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

/* ─── Loader ────────────────────────────────────────────────────── */
.loader {
    width: 48px;
    height: 48px;
    border: 5px solid var(--accent-dim);
    border-bottom-color: var(--accent-hi);
    border-radius: 50%;
    display: inline-block;
    box-sizing: border-box;
    animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
} 

/* ─── Typography helpers ────────────────────────────────────────── */
.mono { font-family: var(--mono); }
.muted { color: var(--text-muted); }
.dim { color: var(--text-dim); }

/* ─── Overlay backdrop ──────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}
.overlay.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Modal ─────────────────────────────────────────────────────── */
.modal {
  background: var(--primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.25s ease;
  position: relative;
  overflow: hidden;
}

/* ─── Button styles ─────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s ease;
  white-space: nowrap;
  text-decoration: none;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-hi);
  border-color: var(--accent-hi);
}

.btn-ghost {
  background: transparent; color: var(--text-dim); border-color: var(--border);
}
.btn-ghost:hover:not(:disabled) { background: var(--surface2); border-color: var(--border-hi); color: var(--text); }

.btn-danger {
  background: var(--danger); color: #ffffff; border-color: var(--danger);
}
.btn-danger:hover:not(:disabled) {
  background: var(--danger-hi);
  border-color: var(--danger-hi);
}

.btn-icon {
  padding: 6px; background: transparent; border: none;
  color: var(--text-muted); border-radius: var(--radius);
  cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; justify-content: center;
}
.btn-icon:hover { background: var(--surface2); color: var(--text); }

/* ─── Form inputs ───────────────────────────────────────────────── */
.input, .select, .textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--sans); font-size: 13px;
  padding: 8px 12px;
  transition: border-color 0.15s;
  outline: none;
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
.select { cursor: pointer; }
.textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 5px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

/* ─── File drop zone ────────────────────────────────────────────── */
.drop-zone {
  border: 1.5px dashed var(--border-hi);
  border-radius: var(--radius);
  padding: 12px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg);
  color: var(--text-muted);
  font-size: 12px;
  position: relative;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(59,130,246,0.04);
  color: var(--text-dim);
}
.drop-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-zone .dz-icon { font-size: 20px; margin-bottom: 4px; display: block; }

/* ─── Badges ────────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; font-family: var(--mono);
  letter-spacing: 0.03em;
}
.badge-tree  {
  background: rgb(var(--tree-badge) / 0.5);
  color: var(--tree-badge);
  border: 1px solid rgb(var(--tree-badge) / 0.75);
}
.badge-sign  {
  background: rgb(var(--sign-badge) / 0.5);
  color: var(--sign-badge);
  border: 1px solid rgb(var(--sign-badge) / 0.75);
}

/* ─── Toast notifications ───────────────────────────────────────── */
#toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  border-left: 3px solid;
  background: var(--surface2);
  box-shadow: var(--shadow);
  animation: slideInRight 0.25s ease;
  max-width: 320px;
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.toast-success { border-color: var(--success); color: var(--success); }
.toast-error   { border-color: var(--danger);  color: var(--danger-hi); }
.toast-info    { border-color: var(--accent);  color: var(--accent-hi); }

/* ══════════════════════════════════════════════════════════════════
   LOGIN MODAL
══════════════════════════════════════════════════════════════════ */
#login-overlay {
  /* background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.08) 0%, rgba(0,0,0,0.85) 70%); */
  background: var(--bg);
}
#login-modal {
  width: 380px;
  padding: 40px 36px 36px;
}
.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px; justify-content: center;
}
.login-logo-mark {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent-dim), var(--accent));
  display: flex; align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 15px;
  color: #fff;
}
.login-title {
  font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text);
  line-height: 1.2;
}
.login-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

.login-form { display: flex; flex-direction: column; gap: 16px; }
.login-form-group { display: flex; flex-direction: column; }

#login-error {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 12px; color: var(--danger-hi);
  display: none;
}
#login-error.visible { display: block; }

.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 10px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-black);
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; width: 100%;
}
.google-btn:hover { background: var(--surface3); border-color: var(--border-hi); }

.google-icon {
  width: 18px; height: 18px; flex-shrink: 0;
}

.divider {
  display: flex; align-items: center; gap: 12px;
  color: var(--text-muted); font-size: 11px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ══════════════════════════════════════════════════════════════════
   MAIN APP LAYOUT
══════════════════════════════════════════════════════════════════ */
#app { display: none; flex-direction: column; height: 100vh; }
#app.visible { display: flex; }

/* ─── Header ────────────────────────────────────────────────────── */
#header {
  height: 54px;
  background: var(--primary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
}
.header-brand {
  display: flex; align-items: center; gap: 10px;
}
.header-logo-mark {
  width: 28px; height: 28px; border-radius: 6px;
  background: linear-gradient(135deg, var(--accent-dim), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600; color: #fff;
}
.header-title {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.header-actions { display: flex; align-items: center; gap: 8px; }

.user-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; font-size: 12px; color: var(--text-dim);
}
@keyframes pulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
}

/* ─── Main content ──────────────────────────────────────────────── */
#main {
  flex: 1; overflow-y: auto;
  padding: 24px;
}

/* ─── Table toolbar ─────────────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.toolbar-left { display: flex; align-items: center; gap: 12px; }
.section-title {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--text-black); text-transform: uppercase; letter-spacing: 0.08em;
}

.search-input {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text--black); font-family: var(--mono); font-size: 12px;
  padding: 6px 10px; width: 220px; outline: none; transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-black); }

.filter-select {
  background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-black); font-size: 12px;
  padding: 6px 10px; outline: none; cursor: pointer;
}

/* ─── Entity table ───────────────────────────────────────────────── */
.table-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }

thead tr {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
/* table header */
th {
  padding: 10px 16px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text); text-align: left;
  white-space: nowrap;
}
th.col-actions { text-align: right; width: 48px; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }

td {
  padding: 12px 16px;
  font-size: 13px; color: var(--text);
  vertical-align: middle;
}
td.col-id { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
td.col-actions { text-align: right; }
.action-buttons { display: flex; gap: 6px; justify-content: flex-end; }

.table-empty {
  padding: 60px 20px; text-align: center;
  color: var(--text-muted); font-size: 13px;
}
.table-empty .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

/* ─── Ellipsis / Options menu ───────────────────────────────────── */
.options-menu-wrapper { display: inline-flex; }

.options-dropdown {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  min-width: 130px;
  z-index: 100;
  animation: dropDown 0.15s ease;
}
@keyframes dropDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.options-dropdown .menu-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  font-size: 13px; color: var(--text-black);
  cursor: pointer; transition: all 0.1s;
  border: none; background: none; width: 100%; text-align: left;
}
.options-dropdown .menu-item:hover { background: var(--surface3); color: var(--text); }
.options-dropdown .menu-item.danger:hover { color: var(--danger-hi); background: rgba(239,68,68,0.06); }
.options-dropdown .menu-divider { height: 1px; background: var(--border); margin: 2px 0; }

/* ══════════════════════════════════════════════════════════════════
   UPLOAD MODAL  (matches wireframe layout)
══════════════════════════════════════════════════════════════════ */
#upload-overlay .modal {
  width: 820px;
  max-width: 96vw;
  max-height: 92vh;
  flex-shrink: 0;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.modal-body {
  display: flex;
  flex: 1;
  flex-direction: column;
  flex-shrink: 0;
  gap: 20px;
  padding: 20px 24px;
  overflow-y: auto;
  min-height: 0;
}

/* column container, (a row of columns) */
.modal-columns {
  display: flex;
  flex-shrink: 0;
  gap: 20px;
}

/* Left column */
.upload-left {
  flex: 1.1;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  gap: 16px;
  min-width: 0;
  overflow-y: auto;
}

/* Right column */
.upload-right {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  width: 240px;
  gap: 16px;
  overflow-y: auto;
}

/* Gallery carousel section */
.gallery-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.gallery-header {
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.gallery-label { font-size: 12px; font-weight: 600; color: var(--text-dim); }
.gallery-count { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

.gallery-carousel {
  display: flex; gap: 8px;
  padding: 12px 14px; overflow-x: auto;
  min-height: 100px; align-items: center;
}
.gallery-carousel::-webkit-scrollbar { height: 4px; }

.gallery-thumb {
  width: 80px; height: 80px; border-radius: var(--radius);
  border: 1px solid var(--border-hi); overflow: hidden;
  flex-shrink: 0; position: relative; cursor: pointer;
}
.gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
.gallery-thumb-remove {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
  width: 18px; height: 18px; color: var(--danger);
  font-size: 11px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.gallery-thumb:hover .gallery-thumb-remove { opacity: 1; }

.gallery-add-btn {
  width: 80px; height: 80px; border-radius: var(--radius);
  border: 1.5px dashed var(--border-hi);
  background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  font-size: 11px; flex-shrink: 0;
}
.gallery-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.gallery-add-btn input { position: absolute; opacity: 0; width: 0; height: 0; }
.gallery-add-btn .plus { font-size: 20px; line-height: 1; }

/* Hidden on sign type */
.gallery-section.hidden { display: none; }

/* Geometry entries */
.coordinates-section.hidden { display: none; }
.geojson-section.hidden { display: none; }

/* Asset props section */
.props-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.props-inner { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.props-title {
  padding: 10px 14px;
  font-size: 12px; font-weight: 600; color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}

/* Markdown preview */
.markdown-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow-y: auto;
  flex: 1;
  flex-shrink: 0;
  min-height: 300;
}
.markdown-header {
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.markdown-label { font-size: 12px; font-weight: 600; color: var(--text-dim); }
.markdown-tabs { display: flex; gap: 2px; }
.md-tab {
  padding: 3px 10px; border-radius: var(--radius);
  font-size: 11px; font-weight: 500; cursor: pointer;
  border: none; background: transparent; color: var(--text-muted);
  transition: all 0.15s;
}
.md-tab.active { background: var(--surface3); color: var(--text); }
.markdown-content {
  padding: 12px 14px; min-height: 100px;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
  flex: 1;
}
.markdown-content textarea {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--mono); font-size: 12px;
  resize: none; min-height: 100px; line-height: 1.6;
}
#md-preview { display: none; }
#md-preview h1, #md-preview h2, #md-preview h3 { color: var(--text); margin-bottom: 6px; }
#md-preview p { margin-bottom: 8px; }
#md-preview strong { color: var(--accent-hi); }
#md-preview code { font-family: var(--mono); background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; }

/* Right column: thumbnail + file checklist */
.thumb-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.thumb-preview-area {
  height: 110px; position: relative;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden; background: var(--bg);
}
.thumb-preview-area img {
  width: 100%; height: 100%; object-fit: cover;
}
.thumb-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-muted); font-size: 11px;
}
.thumb-placeholder-icon { font-size: 24px; }
.thumb-preview-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.thumb-label {
  padding: 8px 12px;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  border-top: 1px solid var(--border); text-align: center;
  letter-spacing: 0.05em; text-transform: uppercase;
}

/* File checklist */
.checklist-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  flex: 1;
}
.checklist-header { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.checklist-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.checklist-subtitle { font-size: 11px; color: var(--text-muted); }
.checklist-body { padding: 8px; display: flex; flex-direction: column; gap: 4px; }

.checklist-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px;
  border-radius: var(--radius);
  cursor: pointer; transition: background 0.1s;
  border: 1px solid transparent;
}
.checklist-item:hover { background: var(--surface3); }
.checklist-item.active { background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.2); }
.checklist-item.done { background: rgba(34,197,94,0.04); border-color: rgba(34,197,94,0.15); }
